<div class="container mt-5">

  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="mb-0">Customer List</h2>

    <a routerLink="/add" class="btn btn-primary">
      + Add Customer
    </a>
  </div>

  <!-- Loading -->
  <div *ngIf="loading" class="text-center my-5">
    <div class="spinner-border text-primary" role="status">
      <span class="visually-hidden">Loading...</span>
    </div>
    <p class="mt-2">Loading customers...</p>
  </div>

  <!-- Table -->
  <div *ngIf="!loading" class="card shadow-sm" >

    <div class="card-body">

      <div class="table-responsive">

        <table class="table table-striped table-hover align-middle mb-0">

          <thead class="table-dark">
            <tr>
              <th>#</th>
              <th>Customer Name</th>
              <th>Email Id</th>
              <th>Contact Number</th>
              <th width="180">Actions</th>
            </tr>
          </thead>

          <tbody>

            <tr *ngFor="let c of customers; let i = index">
              <td>{{ i + 1 }}</td>
              <td>{{ c.name }}</td>
              <td>{{ c.emailId }}</td>
              <td>{{ getContactNumber(c) }}</td>

              <td>
                <a
                  [routerLink]="['/edit', c.customerId]"
                  class="btn btn-sm btn-warning me-2">
                  Edit
                </a>

                <button
                  class="btn btn-sm btn-danger"
                  (click)="deleteCustomer(c.customerId)">
                  Delete
                </button>
              </td>
            </tr>

            <tr *ngIf="customers.length === 0">
              <td colspan="5" class="text-center text-muted py-4">
                No customers found.
              </td>
            </tr>

          </tbody>

        </table>

      </div>

    </div>

  </div>

</div>
